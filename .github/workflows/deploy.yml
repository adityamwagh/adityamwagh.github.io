# Deploys the same Astro build to GitHub Pages (adityamwagh.github.io), in
# parallel with Cloudflare Pages (adityamwagh.me). The github.io copy keeps old
# inbound links working. No CNAME is committed, so this site stays on the
# github.io domain and never collides with Cloudflare's claim on adityamwagh.me.
# `site` in astro.config stays https://adityamwagh.me, so canonical/OG/sitemap
# URLs point at the primary domain (no duplicate-content penalty).
name: Deploy Astro site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

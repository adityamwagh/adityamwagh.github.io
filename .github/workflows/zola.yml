# Build and deploy Zola site to GitHub Pages
name: Deploy Zola site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          # Floating: installs the latest Zola release each run.
          # Pin to a version (e.g. zola@0.22.1) if a future release breaks the build.
          tool: zola

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Zola
        # Use the https base_url from config.toml (https://adityamwagh.me).
        # The Pages output is http while "Enforce HTTPS" is unavailable
        # (Cloudflare proxies the domain), which caused mixed-content URLs.
        run: zola build

      - name: Build Pagefind search index
        # Indexes the rendered HTML in ./public and writes ./public/pagefind/.
        # (Requires minify_html=false in config so Pagefind can parse <html lang>.)
        run: npx -y pagefind@latest --site public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

# Zola configuration
# Documentation: https://www.getzola.org/documentation/getting-started/configuration/

base_url = "https://adityamwagh.github.io"
title = "Aditya Wagh"
description = "Aditya Wagh — Research Engineer blending robotics and machine learning to build intelligent systems."
author = "Aditya Wagh"

# Compilation settings
compile_sass = true
minify_html = true
build_search_index = true
generate_sitemap = true

# Taxonomies (categories and tags for blog posts)
taxonomies = [
    { name = "categories", feed = false },
    { name = "tags", feed = false },
]

# Generate RSS feed
generate_feeds = true
feed_filenames = ["feed.xml"]

# Markdown settings
[markdown]
highlight_code = true
highlight_theme = "css"

# Extra variables accessible in templates
[extra]
firstname = "Aditya"
secondname = "Wagh"
general_email = "adityamwagh@outlook.com"

[extra.social]
linkedin = "adityamwagh"
github = "adityamwagh"
twitter = "adityamwagh"

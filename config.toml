# Zola configuration
# Documentation: https://www.getzola.org/documentation/getting-started/configuration/

base_url = "https://adityamwagh.me"
title = "Aditya Wagh"
description = "Aditya Wagh — Research Engineer working on world models and spatial intelligence for embodied AI: computer vision and learning systems for self-driving and autonomous robots."
author = "Aditya Wagh"

# Compilation settings
compile_sass = true
minify_html = true
build_search_index = true
generate_sitemap = true

# Taxonomies (categories and tags for blog posts)
taxonomies = [
    { name = "categories", feed = false },
    { name = "tags", feed = false },
]

# Generate RSS feed
generate_feeds = true
feed_filenames = ["feed.xml"]

# Markdown settings
[markdown]

[markdown.highlighting]
# Emit CSS classes (.z-*); colours come from sass/_syntax_highlighting.scss (Everforest).
# A theme name is required by Zola even in class mode; its colours are unused.
style = "class"
theme = "everforest-dark"

# Extra variables accessible in templates
[extra]
firstname = "Aditya"
secondname = "Wagh"
general_email = "adityamwagh@outlook.com"

[extra.social]
linkedin = "adityamwagh"
github = "adityamwagh"
twitter = "adityamwagh"
